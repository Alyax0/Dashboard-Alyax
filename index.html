<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Alyax</title>

<link rel="icon" type="image/jpeg" href="alyax.jpg">

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e222d;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text-muted: #7a7f94;
    --text-dim: #4a4f62;
    --green: #2eca8c;
    --green-dim: rgba(46,202,140,0.12);
    --red: #f05b6a;
    --red-dim: rgba(240,91,106,0.12);
    --accent: #5b8af5;
    --accent-dim: rgba(91,138,245,0.12);
    --font: 'Sora', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page { max-width: 860px; margin: 0 auto; }

  /* ---- HEADER ---- */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .logo { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .date-label { font-size: 12px; color: var(--text-muted); font-family: var(--mono); }

  /* ---- SUMMARY CARDS ---- */
  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 2rem; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.25rem 1rem;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--border-hover); }
  .card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .card-value {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -1px;
  }
  .card-value.green { color: var(--green); }
  .card-value.red { color: var(--red); }
  .card-value.neutral { color: var(--text); }
  .card-sub { font-size: 11px; color: var(--text-dim); margin-top: 6px; font-family: var(--mono); }

  /* ---- ADD SITE ---- */
  .add-site-row {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .add-site-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-site-row input:focus { border-color: var(--accent); }
  .add-site-row input::placeholder { color: var(--text-dim); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 18px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:active { transform: scale(0.97); }

  /* ---- SITE BLOCK ---- */
  .site-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 1rem;
    overflow: hidden;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .site-header:hover { background: rgba(255,255,255,0.02); }
  .site-title { font-weight: 500; font-size: 15px; display: flex; align-items: center; gap: 10px; }
  .site-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .site-meta { display: flex; align-items: center; gap: 14px; }
  .site-balance { font-family: var(--mono); font-size: 14px; font-weight: 500; }
  .site-balance.pos { color: var(--green); }
  .site-balance.neg { color: var(--red); }
  .site-balance.zero { color: var(--text-muted); }
  .chevron { color: var(--text-dim); font-size: 12px; transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  /* ---- TRANSACTIONS TABLE ---- */
  .site-body { display: none; }
  .site-body.open { display: block; }

  .tx-table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-dim);
    font-weight: 400;
    padding: 8px 1rem;
  }
  td {
    padding: 10px 1rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 99px;
  }
  .badge-dep { background: var(--green-dim); color: var(--green); }
  .badge-ret { background: var(--red-dim); color: var(--red); }

  .amount-dep { font-family: var(--mono); color: var(--green); font-size: 13px; }
  .amount-ret { font-family: var(--mono); color: var(--red); font-size: 13px; }
  .tx-note { color: var(--text-muted); font-size: 12px; }

  .del-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 3px 6px;
    border-radius: 6px;
    line-height: 1;
    transition: background 0.15s, color 0.15s;
  }
  .del-btn:hover { background: var(--red-dim); color: var(--red); }

  .empty-msg {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 1.5rem;
    font-style: italic;
  }

  /* ---- ADD TX FORM ---- */
  .add-tx-form {
    display: flex;
    gap: 8px;
    padding: 0.85rem 1rem;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  .add-tx-form input,
  .add-tx-form select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-tx-form input:focus,
  .add-tx-form select:focus { border-color: var(--accent); }
  .add-tx-form input::placeholder { color: var(--text-dim); }
  .add-tx-form select option { background: #1e222d; }
  .inp-date { width: 130px; }
  .inp-type { width: 100px; }
  .inp-amount { width: 110px; }
  .inp-note { flex: 1; min-width: 120px; }
  .btn-add-tx {
    background: transparent;
    border: 1px solid var(--border-hover);
    color: var(--text);
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 13px;
    padding: 7px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-add-tx:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .del-site-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    padding: 3px 7px;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }
  .del-site-btn:hover { background: var(--red-dim); color: var(--red); }

  /* ---- SAVE INDICATOR ---- */
  .save-toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--surface2);
    border: 1px solid var(--border-hover);
    color: var(--green);
    font-family: var(--mono);
    font-size: 11px;
    padding: 7px 14px;
    border-radius: 99px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    z-index: 99;
  }
  .save-toast.show { opacity: 1; transform: translateY(0); }

  /* ---- EMPTY STATE ---- */
  .no-sites {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-dim);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }
  .no-sites p { font-size: 15px; margin-bottom: 6px; color: var(--text-muted); }
  .no-sites small { font-size: 12px; }

  /* ---- FOOTER ---- */
  footer {
    margin-top: 3rem;
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  @media (max-width: 600px) {
    .summary { grid-template-columns: 1fr 1fr; }
    .summary .card:last-child { grid-column: span 2; }
    header { flex-direction: column; align-items: flex-start; gap: 6px; }
    .card-value { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">Dashboard<span> </span>Alyax</div>
    <div class="date-label" id="today-label"></div>
  </header>

  <div class="summary">
    <div class="card">
      <div class="card-label">Total depositado</div>
      <div class="card-value green" id="sum-dep">$0.00</div>
      <div class="card-sub" id="sum-dep-count">0 movimientos</div>
    </div>
    <div class="card">
      <div class="card-label">Total retirado</div>
      <div class="card-value red" id="sum-ret">$0.00</div>
      <div class="card-sub" id="sum-ret-count">0 movimientos</div>
    </div>
    <div class="card">
      <div class="card-label">Balance neto</div>
      <div class="card-value neutral" id="sum-net">$0.00</div>
      <div class="card-sub" id="sum-sites-count">0 sitios</div>
    </div>
  </div>

  <div class="add-site-row">
    <input id="new-site-input" placeholder="Nombre del sitio (Binance, Bet365, PayPal…)" />
    <button class="btn-primary" onclick="addSite()">+ Agregar sitio</button>
  </div>

  <div id="sites-container"></div>
  <div id="no-sites-msg" class="no-sites">
    <p>Sin sitios todavía</p>
    <small>Escribe el nombre de un sitio arriba y agrégalo para empezar.</small>
  </div>

  <footer>los datos se guardan automáticamente en tu navegador 💾</footer>
</div>

<!-- Toast de guardado -->
<div class="save-toast" id="save-toast">✓ guardado</div>

<script>
// ---- STORAGE KEY ----
const STORAGE_KEY = 'alyax_dashboard_v1';

// ---- LOAD STATE ----
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Restaurar campos necesarios
      state.sites = parsed.sites || [];
      state.nextSiteId = parsed.nextSiteId || 1;
      state.nextTxId = parsed.nextTxId || 1;
    }
  } catch(e) {
    console.warn('No se pudo cargar el estado guardado:', e);
  }
}

// ---- SAVE STATE ----
let saveTimer = null;
function saveState() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        sites: state.sites,
        nextSiteId: state.nextSiteId,
        nextTxId: state.nextTxId
      }));
      showToast();
    } catch(e) {
      console.warn('No se pudo guardar el estado:', e);
    }
  }, 300);
}

// ---- TOAST ----
let toastTimer = null;
function showToast() {
  const toast = document.getElementById('save-toast');
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

// ---- STATE ----
const state = { sites: [], nextSiteId: 1, nextTxId: 1 };

// Cargar datos guardados antes de renderizar
loadState();

const fmt = n => '$' + Math.abs(n).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

const siteBalance = s => s.txs.reduce((a, t) => a + (t.type === 'dep' ? t.amount : -t.amount), 0);

function updateSummary() {
  const allTx = state.sites.flatMap(s => s.txs);
  const deps = allTx.filter(t => t.type === 'dep');
  const rets = allTx.filter(t => t.type === 'ret');
  const dep = deps.reduce((a, t) => a + t.amount, 0);
  const ret = rets.reduce((a, t) => a + t.amount, 0);
  const net = dep - ret;

  document.getElementById('sum-dep').textContent = fmt(dep);
  document.getElementById('sum-dep-count').textContent = deps.length + ' movimiento' + (deps.length !== 1 ? 's' : '');
  document.getElementById('sum-ret').textContent = fmt(ret);
  document.getElementById('sum-ret-count').textContent = rets.length + ' movimiento' + (rets.length !== 1 ? 's' : '');

  const netEl = document.getElementById('sum-net');
  netEl.textContent = (net >= 0 ? '+' : '-') + fmt(net);
  netEl.className = 'card-value ' + (net > 0 ? 'green' : net < 0 ? 'red' : 'neutral');
  document.getElementById('sum-sites-count').textContent = state.sites.length + ' sitio' + (state.sites.length !== 1 ? 's' : '');
}

function addSite() {
  const inp = document.getElementById('new-site-input');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  state.sites.push({ id: state.nextSiteId++, name, txs: [], open: true });
  inp.value = '';
  render();
  saveState();
}

document.getElementById('new-site-input').addEventListener('keydown', e => { if (e.key === 'Enter') addSite(); });

function deleteSite(id) {
  if (!confirm('¿Eliminar este sitio y todos sus movimientos?')) return;
  state.sites = state.sites.filter(s => s.id !== id);
  render();
  saveState();
}

function addTx(siteId) {
  const site = state.sites.find(s => s.id === siteId);
  const date = document.getElementById('d-date-' + siteId).value;
  const type = document.getElementById('d-type-' + siteId).value;
  const rawAmt = document.getElementById('d-amt-' + siteId).value;
  const amount = parseFloat(rawAmt);
  const note = document.getElementById('d-note-' + siteId).value.trim();
  if (!date || isNaN(amount) || amount <= 0) {
    document.getElementById('d-amt-' + siteId).style.borderColor = '#f05b6a';
    setTimeout(() => document.getElementById('d-amt-' + siteId).style.borderColor = '', 1200);
    return;
  }
  site.txs.push({ id: state.nextTxId++, date, type, amount: Math.round(amount * 100) / 100, note });
  site.txs.sort((a, b) => b.date.localeCompare(a.date));
  document.getElementById('d-amt-' + siteId).value = '';
  document.getElementById('d-note-' + siteId).value = '';
  render();
  saveState();
}

function deleteTx(siteId, txId) {
  const site = state.sites.find(s => s.id === siteId);
  site.txs = site.txs.filter(t => t.id !== txId);
  render();
  saveState();
}

function toggleSite(id) {
  const site = state.sites.find(s => s.id === id);
  site.open = !site.open;
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  body.classList.toggle('open', site.open);
  chev.classList.toggle('open', site.open);
  saveState(); // guardar también el estado abierto/cerrado
}

function render() {
  updateSummary();
  const container = document.getElementById('sites-container');
  const noMsg = document.getElementById('no-sites-msg');
  noMsg.style.display = state.sites.length ? 'none' : 'block';

  const today = new Date().toISOString().slice(0, 10);

  container.innerHTML = '';
  state.sites.forEach(site => {
    const bal = siteBalance(site);
    const balClass = bal > 0 ? 'pos' : bal < 0 ? 'neg' : 'zero';
    const balStr = (bal > 0 ? '+' : bal < 0 ? '-' : '') + fmt(bal);
    const isOpen = site.open !== false;

    const block = document.createElement('div');
    block.className = 'site-block';
    block.innerHTML = `
      <div class="site-header" onclick="toggleSite(${site.id})">
        <div class="site-title">
          <span class="site-dot"></span>
          ${escHtml(site.name)}
        </div>
        <div class="site-meta">
          <span class="site-balance ${balClass}">${balStr}</span>
          <button class="del-site-btn" onclick="event.stopPropagation(); deleteSite(${site.id})" title="Eliminar sitio">✕</button>
          <span class="chevron ${isOpen ? 'open' : ''}" id="chev-${site.id}">▼</span>
        </div>
      </div>
      <div class="site-body ${isOpen ? 'open' : ''}" id="body-${site.id}">
        <div class="tx-table-wrap">
          ${site.txs.length === 0 ? `<div class="empty-msg">Sin movimientos. Agrega uno abajo.</div>` : `
          <table>
            <thead><tr>
              <th>Fecha</th><th>Tipo</th><th>Monto</th><th>Nota</th><th></th>
            </tr></thead>
            <tbody>
              ${site.txs.map(t => `
                <tr>
                  <td style="font-family:var(--mono);font-size:12px;color:var(--text-muted)">${t.date}</td>
                  <td><span class="badge badge-${t.type}">${t.type === 'dep' ? 'Depósito' : 'Retiro'}</span></td>
                  <td class="amount-${t.type}">${t.type === 'dep' ? '+' : '-'}${fmt(t.amount)}</td>
                  <td class="tx-note">${escHtml(t.note) || '—'}</td>
                  <td><button class="del-btn" onclick="deleteTx(${site.id},${t.id})" title="Eliminar">✕</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>`}
        </div>
        <div class="add-tx-form">
          <input class="inp-date" type="date" id="d-date-${site.id}" value="${today}" />
          <select class="inp-type" id="d-type-${site.id}">
            <option value="dep">Depósito</option>
            <option value="ret">Retiro</option>
          </select>
          <input class="inp-amount" type="number" id="d-amt-${site.id}" placeholder="Monto" min="0" step="0.01" />
          <input class="inp-note" type="text" id="d-note-${site.id}" placeholder="Nota (opcional)" />
          <button class="btn-add-tx" onclick="addTx(${site.id})">+ Agregar</button>
        </div>
      </div>
    `;
    container.appendChild(block);

    document.getElementById('d-amt-' + site.id).addEventListener('keydown', e => { if (e.key === 'Enter') addTx(site.id); });
    document.getElementById('d-note-' + site.id).addEventListener('keydown', e => { if (e.key === 'Enter') addTx(site.id); });
  });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Date label
const now = new Date();
document.getElementById('today-label').textContent = now.toLocaleDateString('es-MX', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

render();
</script>
</body>
</html>
